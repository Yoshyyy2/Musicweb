<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Musik</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0d0d0d;
      --surface: #161616;
      --surface2: #1e1e1e;
      --border: #2a2a2a;
      --accent: #e8441a;
      --accent2: #f97316;
      --text: #f0ede8;
      --muted: #6b6560;
      --player-h: 90px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* HEADER */
    .header {
      position: sticky; top: 0; z-index: 50;
      background: rgba(13,13,13,0.9);
      backdrop-filter: blur(16px);
      padding: 16px 20px 12px;
      border-bottom: 1px solid var(--border);
    }
    .header-top {
      display: flex; align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }
    .logo {
      font-family: 'Syne', sans-serif;
      font-size: 24px; font-weight: 800;
      letter-spacing: -1px;
    }
    .logo span { color: var(--accent); }
    .header-icons { display: flex; gap: 10px; }
    .icon-btn {
      background: var(--surface2); border: none;
      border-radius: 50%; width: 36px; height: 36px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; color: var(--text); transition: background 0.2s;
    }
    .icon-btn:hover { background: var(--border); }
    .icon-btn svg { width: 17px; height: 17px; }

    .search-bar {
      display: flex; align-items: center; gap: 10px;
      background: var(--surface2);
      border: 1.5px solid var(--border);
      border-radius: 12px; padding: 10px 14px;
      transition: border-color 0.2s;
    }
    .search-bar:focus-within { border-color: var(--accent); }
    .search-bar svg { width: 17px; height: 17px; color: var(--muted); flex-shrink: 0; }
    .search-bar input {
      flex: 1; background: none; border: none; outline: none;
      color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 15px;
    }
    .search-bar input::placeholder { color: var(--muted); }
    #clear-btn {
      background: none; border: none; cursor: pointer;
      color: var(--muted); display: none;
    }
    #clear-btn svg { width: 16px; height: 16px; }

    /* MOODS */
    .moods {
      display: flex; gap: 8px;
      overflow-x: auto; padding: 14px 20px 0;
      scrollbar-width: none;
    }
    .moods::-webkit-scrollbar { display: none; }
    .mood-chip {
      flex-shrink: 0; padding: 7px 16px;
      border-radius: 999px; border: 1px solid var(--border);
      background: var(--surface); color: var(--muted);
      font-size: 13px; font-weight: 500; cursor: pointer;
      transition: all 0.2s; white-space: nowrap;
    }
    .mood-chip.active, .mood-chip:hover {
      background: var(--accent); border-color: var(--accent); color: #fff;
    }

    /* MAIN */
    main { padding: 0 20px calc(var(--player-h) + 28px); }

    /* FEATURED */
    .featured-wrap { margin: 16px 0; }
    .section-label {
      font-family: 'Syne', sans-serif; font-size: 11px; font-weight: 700;
      letter-spacing: 2px; text-transform: uppercase;
      color: var(--muted); margin-bottom: 12px;
    }
    .featured-card {
      position: relative; border-radius: 20px; overflow: hidden;
      cursor: pointer; height: 220px; background: var(--surface2);
    }
    .featured-card img {
      width: 100%; height: 100%; object-fit: cover;
      transition: transform 0.4s ease;
    }
    .featured-card:hover img { transform: scale(1.04); }
    .featured-overlay {
      position: absolute; inset: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.88) 0%, transparent 55%);
      padding: 16px;
      display: flex; flex-direction: column; justify-content: flex-end;
    }
    .featured-title {
      font-family: 'Syne', sans-serif; font-size: 20px; font-weight: 800; line-height: 1.2;
    }
    .featured-artist { color: rgba(255,255,255,0.65); font-size: 13px; margin-top: 4px; }
    .featured-badge {
      position: absolute; top: 14px; left: 14px;
      background: var(--accent); color: #fff;
      font-size: 10px; font-weight: 700; letter-spacing: 1px;
      text-transform: uppercase; padding: 4px 10px; border-radius: 999px;
    }
    .featured-play-btn {
      position: absolute; bottom: 16px; right: 16px;
      width: 46px; height: 46px; background: var(--accent);
      border-radius: 50%; border: none;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; box-shadow: 0 4px 24px rgba(232,68,26,0.5);
      transition: transform 0.2s;
    }
    .featured-play-btn:hover { transform: scale(1.1); }
    .featured-play-btn svg { width: 20px; height: 20px; color: #fff; margin-left: 2px; }

    /* SONG LIST */
    .section-header {
      display: flex; justify-content: space-between; align-items: center;
      margin: 20px 0 12px;
    }
    .section-title { font-family: 'Syne', sans-serif; font-size: 17px; font-weight: 700; }

    .song-list { display: flex; flex-direction: column; gap: 2px; }
    .song-item {
      display: flex; align-items: center; gap: 12px;
      padding: 8px 10px; border-radius: 12px;
      cursor: pointer; transition: background 0.15s;
    }
    .song-item:hover, .song-item.active { background: var(--surface2); }
    .song-item.active .song-title { color: var(--accent); }

    .song-thumb {
      width: 52px; height: 52px; border-radius: 10px;
      object-fit: cover; flex-shrink: 0; background: var(--surface2);
    }
    .song-info { flex: 1; min-width: 0; }
    .song-title {
      font-size: 14px; font-weight: 500;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .song-artist { font-size: 12px; color: var(--muted); margin-top: 2px; }
    .song-duration { font-size: 12px; color: var(--muted); flex-shrink: 0; }
    .song-like-btn {
      background: none; border: none; cursor: pointer;
      color: var(--muted); padding: 4px; transition: color 0.15s; flex-shrink: 0;
    }
    .song-like-btn:hover, .song-like-btn.liked { color: var(--accent); }
    .song-like-btn svg { width: 16px; height: 16px; display: block; }

    /* EQ BARS */
    .eq-bars { display: flex; gap: 2px; align-items: flex-end; height: 16px; flex-shrink: 0; }
    .eq-bar {
      width: 3px; background: var(--accent); border-radius: 1px;
      animation: eq 0.7s ease-in-out infinite alternate;
    }
    .eq-bar:nth-child(2) { animation-duration: 1s; animation-delay: 0.1s; }
    .eq-bar:nth-child(3) { animation-duration: 0.8s; animation-delay: 0.2s; }
    @keyframes eq { from { height: 3px; } to { height: 14px; } }

    /* LOADING */
    .loading-dots {
      display: flex; gap: 6px; align-items: center;
      justify-content: center; padding: 32px;
    }
    .loading-dots span {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--accent);
      animation: bounce 0.8s ease-in-out infinite;
    }
    .loading-dots span:nth-child(2) { animation-delay: 0.15s; }
    .loading-dots span:nth-child(3) { animation-delay: 0.3s; }
    @keyframes bounce {
      0%,100% { transform: translateY(0); opacity: 0.4; }
      50% { transform: translateY(-7px); opacity: 1; }
    }

    .empty-state { text-align: center; padding: 48px 20px; color: var(--muted); }
    .empty-state svg { width: 48px; height: 48px; margin-bottom: 12px; opacity: 0.3; }
    .empty-state p { font-size: 14px; }

    /* PLAYER */
    .player {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
      background: rgba(20,20,20,0.97);
      backdrop-filter: blur(24px);
      border-top: 1px solid var(--border);
      padding: 10px 16px 18px;
      transform: translateY(100%);
      transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
    }
    .player.visible { transform: translateY(0); }

    .progress-bar {
      width: 100%; height: 3px; background: var(--border);
      border-radius: 999px; margin-bottom: 6px;
      cursor: pointer; position: relative;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      border-radius: 999px; width: 0%;
      pointer-events: none;
    }
    .time-row {
      display: flex; justify-content: space-between;
      font-size: 10px; color: var(--muted);
      margin-bottom: 10px;
    }

    .player-main {
      display: flex; align-items: center; gap: 12px;
    }
    .player-thumb {
      width: 48px; height: 48px; border-radius: 10px;
      object-fit: cover; flex-shrink: 0; background: var(--surface2);
    }
    .player-info { flex: 1; min-width: 0; }
    .player-title {
      font-family: 'Syne', sans-serif; font-size: 14px; font-weight: 700;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .player-artist { font-size: 12px; color: var(--muted); margin-top: 2px; }
    .player-controls { display: flex; gap: 4px; align-items: center; }
    .ctrl-btn {
      background: none; border: none; cursor: pointer;
      color: var(--text); padding: 7px; border-radius: 50%;
      transition: color 0.15s, background 0.15s;
    }
    .ctrl-btn:hover { color: var(--accent); background: var(--surface2); }
    .ctrl-btn svg { width: 22px; height: 22px; display: block; }
    .ctrl-btn.primary {
      background: var(--accent); padding: 0;
      width: 46px; height: 46px;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 18px rgba(232,68,26,0.45);
    }
    .ctrl-btn.primary:hover { background: var(--accent2); color: #fff; }
    .ctrl-btn.liked { color: var(--accent); }

    /* STATUS */
    .status-bar {
      text-align: center; font-size: 11px;
      color: var(--muted); padding: 6px 0 0; min-height: 18px;
    }
    .status-bar.error { color: #e8441a; }

    /* TOAST */
    .toast {
      position: fixed;
      bottom: calc(var(--player-h) + 24px);
      left: 50%; transform: translateX(-50%) translateY(16px);
      background: var(--surface2); border: 1px solid var(--border);
      color: var(--text); font-size: 13px; padding: 10px 18px;
      border-radius: 999px; opacity: 0;
      transition: all 0.25s; z-index: 200; white-space: nowrap; pointer-events: none;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .fade-up { animation: fadeUp 0.3s ease forwards; }
  </style>
</head>
<body>

<!-- HEADER -->
<header class="header">
  <div class="header-top">
    <div class="logo">mu<span>s</span>ik</div>
    <div class="header-icons">
      <button class="icon-btn" onclick="toggleLikedView()" title="Liked songs">
        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
        </svg>
      </button>
    </div>
  </div>
  <div class="search-bar">
    <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
      <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
    </svg>
    <input id="search-input" type="text" placeholder="Search songs, artists..." autocomplete="off" />
    <button id="clear-btn" onclick="clearSearch()">
      <svg fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
        <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
      </svg>
    </button>
  </div>
</header>

<!-- MOODS -->
<div class="moods" id="moods-bar">
  <button class="mood-chip active" data-mood="opm">OPM</button>
  <button class="mood-chip" data-mood="chill">Chill</button>
  <button class="mood-chip" data-mood="phonk">Phonk</button>
  <button class="mood-chip" data-mood="kundiman">Kundiman</button>
  <button class="mood-chip" data-mood="lofi">Lo-fi</button>
  <button class="mood-chip" data-mood="pop">Pop Hits</button>
  <button class="mood-chip" data-mood="rnb">R&amp;B</button>
  <button class="mood-chip" data-mood="acoustic">Acoustic</button>
</div>

<!-- MAIN -->
<main>
  <div class="featured-wrap" id="featured-wrap"></div>
  <div class="section-header">
    <span class="section-title" id="list-title">For You</span>
  </div>
  <div class="song-list" id="song-list">
    <div class="loading-dots"><span></span><span></span><span></span></div>
  </div>
</main>

<!-- PLAYER -->
<div class="player" id="player">
  <div class="progress-bar" id="progress-bar" onclick="seekTo(event)">
    <div class="progress-fill" id="progress-fill"></div>
  </div>
  <div class="time-row">
    <span id="time-cur">0:00</span>
    <span id="time-dur">0:00</span>
  </div>
  <div class="player-main">
    <img class="player-thumb" id="player-thumb" src="" alt="" />
    <div class="player-info">
      <div class="player-title" id="player-title">—</div>
      <div class="player-artist" id="player-artist">—</div>
    </div>
    <div class="player-controls">
      <button class="ctrl-btn" id="like-btn" onclick="toggleLike()" title="Like">
        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
        </svg>
      </button>
      <button class="ctrl-btn" onclick="prevSong()" title="Previous">
        <svg fill="currentColor" viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/></svg>
      </button>
      <button class="ctrl-btn primary" id="play-pause-btn" onclick="togglePlay()" title="Play/Pause">
        <svg id="play-icon" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
      </button>
      <button class="ctrl-btn" onclick="nextSong()" title="Next">
        <svg fill="currentColor" viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>
      </button>
    </div>
  </div>
  <div class="status-bar" id="status-bar"></div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<!-- HIDDEN AUDIO ELEMENT -->
<audio id="audio" preload="none"></audio>

<script>
// ── STATE ──────────────────────────────────────
let songs = [];
let currentIndex = -1;
let isPlaying = false;
let likedSongs = JSON.parse(localStorage.getItem('liked') || '[]');
let currentMood = 'opm';
let showingLiked = false;

const audio = document.getElementById('audio');

// ── INVIDIOUS INSTANCES (try each until one works) ──
const INSTANCES = [
  'https://inv.nadeko.net',
  'https://invidious.nerdvpn.de',
  'https://invidious.privacyredirect.com',
  'https://y.com.sb',
  'https://invidious.fdn.fr',
];
let instanceIdx = 0;

// ── FETCH SONGS ────────────────────────────────
async function fetchSongs(query) {
  showLoading();
  let fetched = false;
  for (let i = 0; i < INSTANCES.length; i++) {
    try {
      const base = INSTANCES[(instanceIdx + i) % INSTANCES.length];
      const url = `${base}/api/v1/search?q=${encodeURIComponent(query)}&type=video&fields=videoId,title,author,lengthSeconds,videoThumbnails`;
      const res = await fetch(url, { signal: AbortSignal.timeout(7000) });
      if (!res.ok) throw new Error('bad response');
      const data = await res.json();
      songs = data.slice(0, 20).map(v => ({
        id: v.videoId,
        title: v.title,
        artist: v.author,
        duration: formatDur(v.lengthSeconds),
        durationSec: v.lengthSeconds,
        thumb: getBestThumb(v.videoThumbnails),
      }));
      instanceIdx = (instanceIdx + i) % INSTANCES.length;
      fetched = true;
      break;
    } catch(e) { /* try next */ }
  }
  if (!fetched) {
    songs = getFallback(query);
    showToast('Using offline data 📀');
  }
  renderFeatured();
  renderSongs();
}

function getBestThumb(thumbs) {
  if (!thumbs?.length) return '';
  for (const q of ['maxresdefault','sddefault','hqdefault','mqdefault']) {
    const t = thumbs.find(x => x.quality === q);
    if (t) return t.url;
  }
  return thumbs[0]?.url || '';
}

function formatDur(s) {
  if (!s) return '—';
  const m = Math.floor(s / 60), sec = s % 60;
  return `${m}:${String(sec).padStart(2,'0')}`;
}

// ── AUDIO PLAYBACK via Invidious streams ───────
async function getAudioUrl(videoId) {
  for (let i = 0; i < INSTANCES.length; i++) {
    try {
      const base = INSTANCES[(instanceIdx + i) % INSTANCES.length];
      const url = `${base}/api/v1/videos/${videoId}?fields=adaptiveFormats,formatStreams`;
      const res = await fetch(url, { signal: AbortSignal.timeout(9000) });
      if (!res.ok) throw new Error('bad');
      const data = await res.json();

      // Prefer audio-only adaptive formats
      const audioFormats = (data.adaptiveFormats || [])
        .filter(f => f.type?.includes('audio'))
        .sort((a, b) => (b.bitrate || 0) - (a.bitrate || 0));
      if (audioFormats.length) {
        instanceIdx = (instanceIdx + i) % INSTANCES.length;
        return audioFormats[0].url;
      }

      // Fallback to combined streams (has video+audio, still plays audio)
      const streams = data.formatStreams || [];
      if (streams.length) {
        instanceIdx = (instanceIdx + i) % INSTANCES.length;
        return streams[streams.length - 1].url;
      }
    } catch(e) { /* try next */ }
  }
  return null;
}

async function playSong(index) {
  if (index < 0 || index >= songs.length) return;
  currentIndex = index;
  const s = songs[index];

  // Update player UI instantly
  document.getElementById('player-thumb').src = s.thumb || '';
  document.getElementById('player-title').textContent = s.title;
  document.getElementById('player-artist').textContent = s.artist;
  document.getElementById('player').classList.add('visible');
  document.getElementById('progress-fill').style.width = '0%';
  document.getElementById('time-cur').textContent = '0:00';
  document.getElementById('time-dur').textContent = s.duration || '—';
  setStatus('Loading audio…');
  updateLikeBtn();
  renderSongs();

  // Stop current audio
  audio.pause();
  audio.src = '';
  isPlaying = false;
  updatePlayIcon();

  const audioUrl = await getAudioUrl(s.id);
  if (!audioUrl) {
    setStatus('⚠ Could not load. Try another song.', true);
    return;
  }

  audio.src = audioUrl;
  audio.load();
  try {
    await audio.play();
    isPlaying = true;
    updatePlayIcon();
    setStatus('');
    renderSongs();
  } catch(e) {
    // Browser may block autoplay — user just taps play
    setStatus('Tap ▶ to play', false);
    isPlaying = false;
    updatePlayIcon();
  }
}

function togglePlay() {
  if (currentIndex < 0) return;
  if (audio.paused) {
    audio.play()
      .then(() => { isPlaying = true; updatePlayIcon(); setStatus(''); })
      .catch(() => setStatus('⚠ Playback blocked by browser.', true));
  } else {
    audio.pause();
    isPlaying = false;
    updatePlayIcon();
  }
}

function nextSong() {
  if (!songs.length) return;
  playSong((currentIndex + 1) % songs.length);
}
function prevSong() {
  if (!songs.length) return;
  playSong((currentIndex - 1 + songs.length) % songs.length);
}

// Audio events
audio.addEventListener('ended', nextSong);
audio.addEventListener('timeupdate', () => {
  const dur = audio.duration || 0;
  const cur = audio.currentTime || 0;
  if (dur > 0) {
    document.getElementById('progress-fill').style.width = ((cur / dur) * 100) + '%';
    document.getElementById('time-cur').textContent = formatDur(Math.floor(cur));
    document.getElementById('time-dur').textContent = formatDur(Math.floor(dur));
  }
});
audio.addEventListener('waiting', () => setStatus('Buffering…'));
audio.addEventListener('playing', () => { setStatus(''); isPlaying = true; updatePlayIcon(); renderSongs(); });
audio.addEventListener('pause',   () => { isPlaying = false; updatePlayIcon(); renderSongs(); });
audio.addEventListener('error',   () => { setStatus('⚠ Stream error. Try another song.', true); isPlaying = false; updatePlayIcon(); });

function seekTo(e) {
  if (!audio.src || !audio.duration) return;
  const bar = e.currentTarget;
  audio.currentTime = (e.offsetX / bar.offsetWidth) * audio.duration;
}

function updatePlayIcon() {
  document.getElementById('play-icon').innerHTML = isPlaying
    ? '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>'
    : '<path d="M8 5v14l11-7z"/>';
}

// ── LIKES ──────────────────────────────────────
function toggleLike() {
  if (currentIndex < 0) return;
  toggleLikeById(songs[currentIndex].id);
  updateLikeBtn();
  renderSongs();
}
function toggleLikeById(id) {
  const i = likedSongs.indexOf(id);
  if (i === -1) { likedSongs.push(id); showToast('Added to Liked ♥'); }
  else          { likedSongs.splice(i, 1); showToast('Removed from Liked'); }
  localStorage.setItem('liked', JSON.stringify(likedSongs));
}
function updateLikeBtn() {
  if (currentIndex < 0) return;
  const liked = likedSongs.includes(songs[currentIndex].id);
  const btn = document.getElementById('like-btn');
  btn.classList.toggle('liked', liked);
  btn.querySelector('svg').setAttribute('fill', liked ? 'currentColor' : 'none');
}

// ── RENDER ─────────────────────────────────────
function showLoading() {
  document.getElementById('song-list').innerHTML =
    '<div class="loading-dots"><span></span><span></span><span></span></div>';
  document.getElementById('featured-wrap').innerHTML = '';
}

function renderFeatured() {
  if (!songs.length || showingLiked) {
    document.getElementById('featured-wrap').innerHTML = '';
    return;
  }
  const s = songs[0];
  document.getElementById('featured-wrap').innerHTML = `
    <p class="section-label">Featured</p>
    <div class="featured-card fade-up" onclick="playSong(0)">
      <img src="${s.thumb}" alt="${esc(s.title)}" onerror="this.style.display='none'" />
      <div class="featured-overlay">
        <div class="featured-title">${esc(s.title)}</div>
        <div class="featured-artist">${esc(s.artist)}</div>
      </div>
      <span class="featured-badge">▶ Play</span>
      <button class="featured-play-btn" onclick="event.stopPropagation();playSong(0)">
        <svg fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
      </button>
    </div>
  `;
}

function renderSongs() {
  const list = document.getElementById('song-list');
  const src = showingLiked
    ? songs.filter(s => likedSongs.includes(s.id))
    : songs.slice(1);

  if (!src.length) {
    list.innerHTML = `<div class="empty-state">
      <svg fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
        <path d="M9 19V6l12-3v13M9 19c0 1.1-.9 2-2 2s-2-.9-2-2 .9-2 2-2 2 .9 2 2zm12-3c0 1.1-.9 2-2 2s-2-.9-2-2 .9-2 2-2 2 .9 2 2z"/>
      </svg>
      <p>${showingLiked ? 'No liked songs yet' : 'No songs found'}</p>
    </div>`;
    return;
  }

  list.innerHTML = src.map((s, i) => {
    const realIdx = showingLiked ? songs.indexOf(s) : i + 1;
    const active  = realIdx === currentIndex;
    const liked   = likedSongs.includes(s.id);
    return `<div class="song-item ${active ? 'active' : ''} fade-up"
                 style="animation-delay:${i * 0.03}s"
                 onclick="playSong(${realIdx})">
      <img class="song-thumb" src="${s.thumb}" alt="" onerror="this.style.background='#1e1e1e'" />
      <div class="song-info">
        <div class="song-title">${esc(s.title)}</div>
        <div class="song-artist">${esc(s.artist)}</div>
      </div>
      ${active && isPlaying
        ? `<div class="eq-bars"><div class="eq-bar"></div><div class="eq-bar"></div><div class="eq-bar"></div></div>`
        : ''}
      <span class="song-duration">${s.duration}</span>
      <button class="song-like-btn ${liked ? 'liked' : ''}"
              onclick="event.stopPropagation();handleSongLike('${s.id}',this)"
              title="Like">
        <svg fill="${liked ? 'currentColor' : 'none'}" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
        </svg>
      </button>
    </div>`;
  }).join('');
}

function handleSongLike(id, btn) {
  toggleLikeById(id);
  const liked = likedSongs.includes(id);
  btn.classList.toggle('liked', liked);
  btn.querySelector('svg').setAttribute('fill', liked ? 'currentColor' : 'none');
  if (currentIndex >= 0 && songs[currentIndex]?.id === id) updateLikeBtn();
}

// ── SEARCH ─────────────────────────────────────
const searchInput = document.getElementById('search-input');
let searchTimer;
searchInput.addEventListener('input', function() {
  document.getElementById('clear-btn').style.display = this.value ? 'block' : 'none';
  clearTimeout(searchTimer);
  if (this.value.trim().length > 1) {
    searchTimer = setTimeout(() => {
      showingLiked = false;
      document.getElementById('list-title').textContent = `"${this.value.trim()}"`;
      fetchSongs(this.value.trim() + ' official audio');
    }, 600);
  }
});
function clearSearch() {
  searchInput.value = '';
  document.getElementById('clear-btn').style.display = 'none';
  showingLiked = false;
  document.getElementById('list-title').textContent = 'For You';
  selectMoodByName(currentMood);
}

// ── MOODS ──────────────────────────────────────
const moodQueries = {
  opm:      'OPM love songs Filipino official audio',
  chill:    'chill relaxing music playlist 2024',
  phonk:    'phonk drift music 2024',
  kundiman: 'kundiman classic Filipino songs',
  lofi:     'lofi hip hop study beats',
  pop:      'pop hits 2024 official audio',
  rnb:      'r&b soul playlist 2024',
  acoustic: 'acoustic cover songs 2024',
};

document.querySelectorAll('.mood-chip').forEach(chip => {
  chip.addEventListener('click', () => {
    document.querySelectorAll('.mood-chip').forEach(c => c.classList.remove('active'));
    chip.classList.add('active');
    currentMood = chip.dataset.mood;
    showingLiked = false;
    document.getElementById('list-title').textContent = 'For You';
    fetchSongs(moodQueries[currentMood] || currentMood);
  });
});

function selectMoodByName(mood) {
  const chip = document.querySelector(`.mood-chip[data-mood="${mood}"]`);
  if (chip) chip.click();
}

function toggleLikedView() {
  showingLiked = !showingLiked;
  document.getElementById('list-title').textContent = showingLiked ? 'Liked Songs ♥' : 'For You';
  renderFeatured();
  renderSongs();
}

// ── HELPERS ────────────────────────────────────
function setStatus(msg, isErr = false) {
  const el = document.getElementById('status-bar');
  el.textContent = msg;
  el.className = 'status-bar' + (isErr ? ' error' : '');
}

let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2200);
}

function esc(s) {
  return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
