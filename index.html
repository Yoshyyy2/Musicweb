<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Music</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0d0d0d;
      --surface: #161616;
      --surface2: #1e1e1e;
      --border: #2a2a2a;
      --accent: #e8441a;
      --accent2: #f97316;
      --text: #f0ede8;
      --muted: #6b6560;
      --player-h: 80px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── HEADER ── */
    .header {
      position: sticky; top: 0; z-index: 50;
      background: rgba(13,13,13,0.85);
      backdrop-filter: blur(16px);
      padding: 16px 20px 12px;
      border-bottom: 1px solid var(--border);
    }
    .header-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }
    .logo {
      font-family: 'Syne', sans-serif;
      font-size: 22px;
      font-weight: 800;
      letter-spacing: -0.5px;
      color: var(--text);
    }
    .logo span { color: var(--accent); }

    .header-icons { display: flex; gap: 12px; align-items: center; }
    .icon-btn {
      background: var(--surface2);
      border: none; border-radius: 50%;
      width: 36px; height: 36px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; color: var(--text);
      transition: background 0.2s;
    }
    .icon-btn:hover { background: var(--border); }
    .icon-btn svg { width: 18px; height: 18px; }

    /* SEARCH BAR */
    .search-bar {
      display: flex; align-items: center; gap: 10px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 10px 14px;
      transition: border-color 0.2s;
    }
    .search-bar:focus-within { border-color: var(--accent); }
    .search-bar svg { width: 18px; height: 18px; color: var(--muted); flex-shrink: 0; }
    .search-bar input {
      flex: 1; background: none; border: none; outline: none;
      color: var(--text); font-family: 'DM Sans', sans-serif;
      font-size: 15px;
    }
    .search-bar input::placeholder { color: var(--muted); }
    #clear-btn {
      background: none; border: none; cursor: pointer;
      color: var(--muted); display: none; padding: 2px;
    }
    #clear-btn svg { width: 16px; height: 16px; }

    /* MOOD CHIPS */
    .moods {
      display: flex; gap: 8px;
      overflow-x: auto; padding: 14px 20px 0;
      scrollbar-width: none;
    }
    .moods::-webkit-scrollbar { display: none; }
    .mood-chip {
      flex-shrink: 0;
      padding: 7px 16px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--muted);
      font-size: 13px; font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }
    .mood-chip.active, .mood-chip:hover {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    /* ── MAIN ── */
    main {
      padding: 0 20px calc(var(--player-h) + 24px);
    }

    /* FEATURED CARD */
    .featured-wrap {
      margin: 16px 0;
    }
    .section-label {
      font-family: 'Syne', sans-serif;
      font-size: 11px; font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 12px;
    }
    .featured-card {
      position: relative;
      border-radius: 20px;
      overflow: hidden;
      cursor: pointer;
      height: 220px;
      background: var(--surface2);
    }
    .featured-card img {
      width: 100%; height: 100%;
      object-fit: cover;
      transition: transform 0.4s ease;
    }
    .featured-card:hover img { transform: scale(1.04); }
    .featured-overlay {
      position: absolute; inset: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.85) 0%, transparent 60%);
      padding: 16px;
      display: flex; flex-direction: column; justify-content: flex-end;
    }
    .featured-title {
      font-family: 'Syne', sans-serif;
      font-size: 20px; font-weight: 800;
      line-height: 1.2;
    }
    .featured-artist { color: rgba(255,255,255,0.7); font-size: 13px; margin-top: 4px; }
    .featured-badge {
      position: absolute; top: 14px; left: 14px;
      background: var(--accent);
      color: #fff; font-size: 10px; font-weight: 700;
      letter-spacing: 1px; text-transform: uppercase;
      padding: 4px 10px; border-radius: 999px;
    }
    .featured-play-btn {
      position: absolute; bottom: 16px; right: 16px;
      width: 44px; height: 44px;
      background: var(--accent);
      border-radius: 50%; border: none;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      box-shadow: 0 4px 20px rgba(232,68,26,0.5);
      transition: transform 0.2s;
    }
    .featured-play-btn:hover { transform: scale(1.1); }
    .featured-play-btn svg { width: 20px; height: 20px; color: #fff; margin-left: 2px; }

    /* SONG GRID */
    .section-header {
      display: flex; justify-content: space-between; align-items: center;
      margin: 20px 0 12px;
    }
    .section-title {
      font-family: 'Syne', sans-serif;
      font-size: 17px; font-weight: 700;
    }
    .see-all {
      font-size: 12px; color: var(--accent); font-weight: 500;
      background: none; border: none; cursor: pointer;
    }

    .song-list { display: flex; flex-direction: column; gap: 4px; }

    .song-item {
      display: flex; align-items: center; gap: 12px;
      padding: 8px 10px;
      border-radius: 12px;
      cursor: pointer;
      transition: background 0.15s;
      position: relative;
    }
    .song-item:hover, .song-item.active { background: var(--surface2); }
    .song-item.active .song-title { color: var(--accent); }

    .song-thumb {
      width: 52px; height: 52px;
      border-radius: 10px;
      object-fit: cover;
      flex-shrink: 0;
      background: var(--surface2);
    }
    .song-thumb-placeholder {
      width: 52px; height: 52px;
      border-radius: 10px;
      flex-shrink: 0;
      background: var(--surface2);
      display: flex; align-items: center; justify-content: center;
    }
    .song-thumb-placeholder svg { width: 22px; height: 22px; color: var(--muted); }

    .song-info { flex: 1; min-width: 0; }
    .song-title {
      font-size: 14px; font-weight: 500;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .song-artist { font-size: 12px; color: var(--muted); margin-top: 2px; }

    .song-duration { font-size: 12px; color: var(--muted); flex-shrink: 0; }

    .song-actions {
      display: flex; gap: 6px; flex-shrink: 0;
    }
    .song-action-btn {
      background: none; border: none; cursor: pointer;
      color: var(--muted); padding: 4px;
      transition: color 0.15s;
    }
    .song-action-btn:hover, .song-action-btn.liked { color: var(--accent); }
    .song-action-btn svg { width: 16px; height: 16px; }

    /* LOADING */
    .loading-dots {
      display: flex; gap: 6px; align-items: center;
      justify-content: center; padding: 24px;
    }
    .loading-dots span {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--accent);
      animation: bounce 0.8s ease-in-out infinite;
    }
    .loading-dots span:nth-child(2) { animation-delay: 0.15s; }
    .loading-dots span:nth-child(3) { animation-delay: 0.3s; }
    @keyframes bounce {
      0%, 100% { transform: translateY(0); opacity: 0.4; }
      50% { transform: translateY(-6px); opacity: 1; }
    }

    .empty-state {
      text-align: center; padding: 40px 20px;
      color: var(--muted);
    }
    .empty-state svg { width: 48px; height: 48px; margin-bottom: 12px; opacity: 0.4; }
    .empty-state p { font-size: 14px; }

    /* ── PLAYER ── */
    .player {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
      background: rgba(22,22,22,0.97);
      backdrop-filter: blur(20px);
      border-top: 1px solid var(--border);
      padding: 12px 16px 16px;
      transform: translateY(100%);
      transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
    }
    .player.visible { transform: translateY(0); }

    .player-progress {
      width: 100%; height: 3px;
      background: var(--border);
      border-radius: 999px;
      margin-bottom: 12px;
      cursor: pointer;
      position: relative;
    }
    .player-progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      border-radius: 999px;
      width: 0%;
      transition: width 0.5s linear;
      pointer-events: none;
    }

    .player-main {
      display: flex; align-items: center; gap: 12px;
    }
    .player-thumb {
      width: 48px; height: 48px;
      border-radius: 10px; object-fit: cover;
      flex-shrink: 0; background: var(--surface2);
    }
    .player-info { flex: 1; min-width: 0; }
    .player-title {
      font-family: 'Syne', sans-serif;
      font-size: 14px; font-weight: 700;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .player-artist { font-size: 12px; color: var(--muted); margin-top: 2px; }

    .player-controls { display: flex; gap: 8px; align-items: center; }
    .ctrl-btn {
      background: none; border: none; cursor: pointer;
      color: var(--text); padding: 6px;
      transition: color 0.15s, transform 0.15s;
    }
    .ctrl-btn:hover { color: var(--accent); transform: scale(1.1); }
    .ctrl-btn svg { width: 22px; height: 22px; }
    .ctrl-btn.primary {
      background: var(--accent);
      border-radius: 50%;
      width: 44px; height: 44px;
      display: flex; align-items: center; justify-content: center;
      padding: 0;
      box-shadow: 0 4px 16px rgba(232,68,26,0.4);
    }
    .ctrl-btn.primary:hover { color: #fff; transform: scale(1.05); }
    .ctrl-btn.liked { color: var(--accent); }

    /* YOUTUBE IFRAME (hidden) */
    #yt-player { position: fixed; width: 1px; height: 1px; opacity: 0; pointer-events: none; top: -9999px; }

    /* TOAST */
    .toast {
      position: fixed; bottom: calc(var(--player-h) + 20px); left: 50%; transform: translateX(-50%) translateY(20px);
      background: var(--surface2); border: 1px solid var(--border);
      color: var(--text); font-size: 13px; padding: 10px 18px;
      border-radius: 999px; opacity: 0;
      transition: all 0.3s; z-index: 200;
      white-space: nowrap;
      pointer-events: none;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* EQUALIZER ANIMATION */
    .eq-bars {
      display: flex; gap: 2px; align-items: flex-end;
      height: 16px; width: 16px; flex-shrink: 0;
    }
    .eq-bar {
      width: 3px; background: var(--accent);
      border-radius: 1px;
      animation: eq 0.8s ease-in-out infinite alternate;
    }
    .eq-bar:nth-child(1) { animation-duration: 0.6s; }
    .eq-bar:nth-child(2) { animation-duration: 0.9s; animation-delay: 0.1s; }
    .eq-bar:nth-child(3) { animation-duration: 0.7s; animation-delay: 0.2s; }
    @keyframes eq {
      from { height: 3px; }
      to { height: 14px; }
    }

    /* FADE IN */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .fade-up { animation: fadeUp 0.35s ease forwards; }
  </style>
</head>
<body>

<!-- HEADER -->
<header class="header">
  <div class="header-top">
    <div class="logo">mu<span>s</span>ik</div>
    <div class="header-icons">
      <button class="icon-btn" onclick="toggleLikedView()" title="Disukai">
        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
      </button>
    </div>
  </div>
  <div class="search-bar">
    <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input id="search-input" type="text" placeholder="Cari lagu, artis..." autocomplete="off" />
    <button id="clear-btn" onclick="clearSearch()">
      <svg fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
  </div>
</header>

<!-- MOODS -->
<div class="moods" id="moods-bar">
  <button class="mood-chip active" onclick="selectMood(this,'opm')">OPM</button>
  <button class="mood-chip" onclick="selectMood(this,'chill')">Chill</button>
  <button class="mood-chip" onclick="selectMood(this,'phonk')">Phonk</button>
  <button class="mood-chip" onclick="selectMood(this,'kundiman')">Kundiman</button>
  <button class="mood-chip" onclick="selectMood(this,'lofi')">Lo-fi</button>
  <button class="mood-chip" onclick="selectMood(this,'pop hits')">Pop Hits</button>
  <button class="mood-chip" onclick="selectMood(this,'r&b')">R&B</button>
  <button class="mood-chip" onclick="selectMood(this,'acoustic')">Acoustic</button>
</div>

<!-- MAIN -->
<main>
  <!-- FEATURED -->
  <div class="featured-wrap" id="featured-wrap"></div>

  <!-- SONG LIST -->
  <div class="section-header">
    <span class="section-title" id="list-title">Untukmu</span>
  </div>
  <div class="song-list" id="song-list">
    <div class="loading-dots"><span></span><span></span><span></span></div>
  </div>
</main>

<!-- PLAYER -->
<div class="player" id="player">
  <div class="player-progress" id="progress-bar" onclick="seekTo(event)">
    <div class="player-progress-fill" id="progress-fill"></div>
  </div>
  <div class="player-main">
    <img class="player-thumb" id="player-thumb" src="" alt="" />
    <div class="player-info">
      <div class="player-title" id="player-title">—</div>
      <div class="player-artist" id="player-artist">—</div>
    </div>
    <div class="player-controls">
      <button class="ctrl-btn" id="like-btn" onclick="toggleLike()">
        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
      </button>
      <button class="ctrl-btn" onclick="prevSong()">
        <svg fill="currentColor" viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/></svg>
      </button>
      <button class="ctrl-btn primary" id="play-pause-btn" onclick="togglePlay()">
        <svg id="play-icon" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
      </button>
      <button class="ctrl-btn" onclick="nextSong()">
        <svg fill="currentColor" viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>
      </button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<!-- YOUTUBE IFRAME -->
<div id="yt-player"></div>

<script>
// ─────────────────────────────────────────
// STATE
// ─────────────────────────────────────────
let songs = [];
let currentIndex = -1;
let isPlaying = false;
let ytPlayer = null;
let ytReady = false;
let progressInterval = null;
let likedSongs = JSON.parse(localStorage.getItem('liked') || '[]');
let currentMood = 'opm';
let showingLiked = false;

// ─────────────────────────────────────────
// YOUTUBE IFrame API
// ─────────────────────────────────────────
window.onYouTubeIframeAPIReady = function() {
  ytReady = true;
  ytPlayer = new YT.Player('yt-player', {
    height: '1', width: '1',
    videoId: '',
    playerVars: { autoplay: 0, controls: 0 },
    events: {
      onReady: () => {},
      onStateChange: onPlayerStateChange
    }
  });
};

function onPlayerStateChange(e) {
  if (e.data === YT.PlayerState.ENDED) nextSong();
  if (e.data === YT.PlayerState.PLAYING) {
    isPlaying = true; updatePlayIcon(); startProgress();
  }
  if (e.data === YT.PlayerState.PAUSED) {
    isPlaying = false; updatePlayIcon(); stopProgress();
  }
}

// Load YouTube IFrame API
const ytScript = document.createElement('script');
ytScript.src = 'https://www.youtube.com/iframe_api';
document.head.appendChild(ytScript);

// ─────────────────────────────────────────
// FETCH SONGS via YouTube (no API key)
// Using Invidious public API — free, CORS-friendly
// ─────────────────────────────────────────
const INVIDIOUS = 'https://inv.nadeko.net'; // public Invidious instance

async function fetchSongs(query) {
  showLoading();
  try {
    const url = `${INVIDIOUS}/api/v1/search?q=${encodeURIComponent(query)}&type=video&fields=videoId,title,author,lengthSeconds,videoThumbnails`;
    const res = await fetch(url);
    if (!res.ok) throw new Error('fetch failed');
    const data = await res.json();
    songs = data.slice(0, 20).map(v => ({
      id: v.videoId,
      title: v.title,
      artist: v.author,
      duration: formatDur(v.lengthSeconds),
      thumb: getBestThumb(v.videoThumbnails)
    }));
    renderFeatured();
    renderSongs();
  } catch(e) {
    // Fallback: use hardcoded popular OPM/etc
    songs = getFallbackSongs(query);
    renderFeatured();
    renderSongs();
    showToast('Menggunakan data offline 📀');
  }
}

function getBestThumb(thumbs) {
  if (!thumbs || !thumbs.length) return '';
  const pref = ['maxresdefault','sddefault','hqdefault','mqdefault'];
  for (const p of pref) {
    const t = thumbs.find(x => x.quality === p);
    if (t) return t.url;
  }
  return thumbs[0]?.url || '';
}

function formatDur(s) {
  if (!s) return '—';
  const m = Math.floor(s / 60), sec = s % 60;
  return `${m}:${sec.toString().padStart(2,'0')}`;
}

// ─────────────────────────────────────────
// FALLBACK SONGS (if API down)
// ─────────────────────────────────────────
function getFallbackSongs(query) {
  const opm = [
    { id: 'X3URi7xDDVs', title: 'Maging Sino Ka Man', artist: 'Rey Valera', duration: '4:02' },
    { id: 'Az-9gGGKFjU', title: 'Kahit Maputi Na Ang Buhok Ko', artist: 'Rey Valera', duration: '4:36' },
    { id: 'DjGAl8KHnfY', title: 'Naaalala Ka', artist: 'Eraserheads', duration: '3:21' },
    { id: 'g1_SIHbEOzA', title: 'Harana', artist: 'Parokya ni Edgar', duration: '4:18' },
    { id: 'GIfkKD4CKoA', title: 'Ikaw', artist: 'Yeng Constantino', duration: '3:55' },
    { id: 'TH-lpTHBfAQ', title: 'Pano', artist: 'BoySetsFire', duration: '3:40' },
    { id: 'yjcFpaJgcTo', title: 'Ngayon at Kailanman', artist: 'Jose Mari Chan', duration: '3:50' },
    { id: 'pSUydWEqKwE', title: 'Kung Ikaw Ay Aalis Na', artist: 'Renz Verano', duration: '4:10' },
    { id: 'dQw4w9WgXcQ', title: 'Di Na Muli', artist: 'Sponge Cola', duration: '4:05' },
    { id: 'zGDzdIs73Xw', title: 'Taong Daan', artist: 'Kyla', duration: '3:44' },
  ];
  const chill = [
    { id: 'jfKfPfyJRdk', title: 'lofi hip hop radio', artist: 'Lofi Girl', duration: 'Live' },
    { id: '5yx6BWlEVcY', title: 'Chill Lofi Beats', artist: 'ChilledCow', duration: 'Live' },
    { id: 'lTRiuFIWV54', title: 'Study Beats', artist: 'Lo-Fi Records', duration: '3:22' },
    { id: 'n61ULEU7CO0', title: 'Playlist de Nuit', artist: 'Chilled Music', duration: '2:55' },
    { id: 'DWcJFNfaw9c', title: 'Sunset Vibes', artist: 'Ambient Studio', duration: '4:12' },
  ];
  const phonk = [
    { id: 'rN2FinPKQs0', title: 'PHONK DRIFT', artist: 'Kordhell', duration: '2:38' },
    { id: 'VyZB0j3ncCM', title: 'Murder In My Mind', artist: 'Kordhell', duration: '2:22' },
    { id: 'bTPsZ3bebQM', title: 'MODUS', artist: 'GHOSTEMANE', duration: '2:01' },
    { id: 'hmLVh8VPmGc', title: 'DEAD AHEAD', artist: 'MOONDEITY', duration: '2:40' },
  ];
  const q = query.toLowerCase();
  if (q.includes('opm') || q.includes('kundiman') || q.includes('rey')) return opm.map(addThumb);
  if (q.includes('chill') || q.includes('lofi')) return chill.map(addThumb);
  if (q.includes('phonk')) return phonk.map(addThumb);
  return opm.map(addThumb);
}

function addThumb(s) {
  return { ...s, thumb: `https://i.ytimg.com/vi/${s.id}/hqdefault.jpg` };
}

// ─────────────────────────────────────────
// RENDER
// ─────────────────────────────────────────
function showLoading() {
  document.getElementById('song-list').innerHTML =
    '<div class="loading-dots"><span></span><span></span><span></span></div>';
  document.getElementById('featured-wrap').innerHTML = '';
}

function renderFeatured() {
  if (!songs.length) return;
  const s = songs[0];
  document.getElementById('featured-wrap').innerHTML = `
    <p class="section-label">Em Destaque</p>
    <div class="featured-card fade-up" onclick="playSong(0)">
      <img src="${s.thumb}" alt="${s.title}" onerror="this.style.display='none'" />
      <div class="featured-overlay">
        <div class="featured-title">${escHtml(s.title)}</div>
        <div class="featured-artist">${escHtml(s.artist)}</div>
      </div>
      <span class="featured-badge">▶ Play</span>
      <button class="featured-play-btn" onclick="event.stopPropagation();playSong(0)">
        <svg fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
      </button>
    </div>
  `;
}

function renderSongs() {
  const list = document.getElementById('song-list');
  const src = showingLiked
    ? songs.filter(s => likedSongs.includes(s.id))
    : songs.slice(1);

  if (!src.length) {
    list.innerHTML = `<div class="empty-state">
      <svg fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M9 19V6l12-3v13M9 19c0 1.1-.9 2-2 2s-2-.9-2-2 .9-2 2-2 2 .9 2 2zm12-3c0 1.1-.9 2-2 2s-2-.9-2-2 .9-2 2-2 2 .9 2 2z"/></svg>
      <p>${showingLiked ? 'Belum ada lagu disukai' : 'Tidak ada lagu ditemukan'}</p>
    </div>`;
    return;
  }

  list.innerHTML = src.map((s, i) => {
    const realIdx = showingLiked ? songs.indexOf(s) : i + 1;
    const liked = likedSongs.includes(s.id);
    const active = realIdx === currentIndex;
    return `<div class="song-item ${active ? 'active' : ''} fade-up" style="animation-delay:${i * 0.04}s" onclick="playSong(${realIdx})">
      ${s.thumb
        ? `<img class="song-thumb" src="${s.thumb}" alt="" onerror="this.style.display='none'" />`
        : `<div class="song-thumb-placeholder"><svg fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M9 19V6l12-3v13M9 19c0 1.1-.9 2-2 2s-2-.9-2-2 .9-2 2-2 2 .9 2 2zm12-3c0 1.1-.9 2-2 2s-2-.9-2-2 .9-2 2-2 2 .9 2 2z"/></svg></div>`}
      <div class="song-info">
        <div class="song-title">${escHtml(s.title)}</div>
        <div class="song-artist">${escHtml(s.artist)}</div>
      </div>
      ${active && isPlaying ? `<div class="eq-bars"><div class="eq-bar"></div><div class="eq-bar"></div><div class="eq-bar"></div></div>` : ''}
      <span class="song-duration">${s.duration}</span>
      <div class="song-actions">
        <button class="song-action-btn ${liked ? 'liked' : ''}" onclick="event.stopPropagation();toggleLikeSong('${s.id}', this)">
          <svg fill="${liked ? 'currentColor' : 'none'}" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
        </button>
      </div>
    </div>`;
  }).join('');
}

// ─────────────────────────────────────────
// PLAYBACK
// ─────────────────────────────────────────
function playSong(index) {
  if (index < 0 || index >= songs.length) return;
  currentIndex = index;
  const s = songs[index];

  // Update player UI
  document.getElementById('player-thumb').src = s.thumb || '';
  document.getElementById('player-title').textContent = s.title;
  document.getElementById('player-artist').textContent = s.artist;
  document.getElementById('player').classList.add('visible');
  document.getElementById('progress-fill').style.width = '0%';

  // Like button
  const lb = document.getElementById('like-btn');
  lb.classList.toggle('liked', likedSongs.includes(s.id));

  // Play on YouTube
  if (ytPlayer && ytReady) {
    ytPlayer.loadVideoById(s.id);
    isPlaying = true;
    updatePlayIcon();
    startProgress();
  }

  renderSongs();
}

function togglePlay() {
  if (!ytPlayer || !ytReady || currentIndex < 0) return;
  const state = ytPlayer.getPlayerState();
  if (state === YT.PlayerState.PLAYING) {
    ytPlayer.pauseVideo();
  } else {
    ytPlayer.playVideo();
  }
}

function nextSong() {
  if (songs.length === 0) return;
  playSong((currentIndex + 1) % songs.length);
}

function prevSong() {
  if (songs.length === 0) return;
  playSong((currentIndex - 1 + songs.length) % songs.length);
}

function updatePlayIcon() {
  const icon = document.getElementById('play-icon');
  if (isPlaying) {
    icon.innerHTML = '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>';
  } else {
    icon.innerHTML = '<path d="M8 5v14l11-7z"/>';
  }
}

// ─────────────────────────────────────────
// PROGRESS
// ─────────────────────────────────────────
function startProgress() {
  stopProgress();
  progressInterval = setInterval(() => {
    if (!ytPlayer || !ytReady) return;
    try {
      const dur = ytPlayer.getDuration();
      const cur = ytPlayer.getCurrentTime();
      if (dur > 0) {
        document.getElementById('progress-fill').style.width = ((cur / dur) * 100) + '%';
      }
    } catch(e) {}
  }, 1000);
}

function stopProgress() {
  if (progressInterval) { clearInterval(progressInterval); progressInterval = null; }
}

function seekTo(e) {
  if (!ytPlayer || !ytReady || currentIndex < 0) return;
  const bar = e.currentTarget;
  const pct = e.offsetX / bar.offsetWidth;
  const dur = ytPlayer.getDuration();
  ytPlayer.seekTo(pct * dur, true);
}

// ─────────────────────────────────────────
// LIKES
// ─────────────────────────────────────────
function toggleLike() {
  if (currentIndex < 0) return;
  const id = songs[currentIndex].id;
  toggleLikeSongById(id);
  const lb = document.getElementById('like-btn');
  lb.classList.toggle('liked', likedSongs.includes(id));
}

function toggleLikeSong(id, btn) {
  toggleLikeSongById(id);
  btn.classList.toggle('liked', likedSongs.includes(id));
  const svg = btn.querySelector('svg');
  svg.setAttribute('fill', likedSongs.includes(id) ? 'currentColor' : 'none');
}

function toggleLikeSongById(id) {
  const idx = likedSongs.indexOf(id);
  if (idx === -1) {
    likedSongs.push(id);
    showToast('Ditambahkan ke Disukai ♥');
  } else {
    likedSongs.splice(idx, 1);
    showToast('Dihapus dari Disukai');
  }
  localStorage.setItem('liked', JSON.stringify(likedSongs));
}

function toggleLikedView() {
  showingLiked = !showingLiked;
  document.getElementById('list-title').textContent = showingLiked ? 'Disukai ♥' : 'Untukmu';
  document.getElementById('featured-wrap').style.display = showingLiked ? 'none' : '';
  renderSongs();
}

// ─────────────────────────────────────────
// SEARCH
// ─────────────────────────────────────────
const searchInput = document.getElementById('search-input');
let searchTimer;

searchInput.addEventListener('input', function() {
  document.getElementById('clear-btn').style.display = this.value ? 'block' : 'none';
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => {
    if (this.value.trim().length > 1) {
      document.getElementById('list-title').textContent = `"${this.value}"`;
      showingLiked = false;
      fetchSongs(this.value.trim());
    }
  }, 600);
});

function clearSearch() {
  searchInput.value = '';
  document.getElementById('clear-btn').style.display = 'none';
  selectMoodByName(currentMood);
}

// ─────────────────────────────────────────
// MOODS
// ─────────────────────────────────────────
const moodQueries = {
  opm: 'OPM love songs Filipino',
  chill: 'chill relaxing music playlist',
  phonk: 'phonk drift music 2024',
  kundiman: 'kundiman classic Filipino',
  lofi: 'lofi hip hop study beats',
  'pop hits': 'pop hits 2024 playlist',
  'r&b': 'r&b soul music playlist',
  acoustic: 'acoustic cover songs playlist'
};

function selectMood(btn, mood) {
  document.querySelectorAll('.mood-chip').forEach(c => c.classList.remove('active'));
  btn.classList.add('active');
  currentMood = mood;
  showingLiked = false;
  document.getElementById('list-title').textContent = 'Untukmu';
  fetchSongs(moodQueries[mood] || mood);
}

function selectMoodByName(mood) {
  const chip = [...document.querySelectorAll('.mood-chip')]
    .find(c => c.textContent.toLowerCase() === mood);
  if (chip) chip.click();
}

// ─────────────────────────────────────────
// TOAST
// ─────────────────────────────────────────
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2200);
}

function escHtml(s) {
  return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ─────────────────────────────────────────
// INIT
// ─────────────────────────────────────────
fetchSongs(moodQueries['opm']);
</script>
</body>
</html>
