<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Wave Music</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
<style>
:root{
--bg:#0b0f1a;
--card:#121829;
--accent:#7c3aed;
--accent2:#22d3ee;
--text:#e5e7eb;
--muted:#6b7280;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Inter;background:linear-gradient(135deg,#0b0f1a,#0f172a);color:var(--text)}
header{padding:20px;font-weight:800;font-size:22px}
.search{padding:0 20px 20px}
input{width:100%;padding:12px;border-radius:12px;border:none;background:var(--card);color:white}
.list{padding:0 20px}
.song{padding:14px;margin-bottom:10px;border-radius:14px;background:var(--card);cursor:pointer;transition:.2s}
.song:hover{transform:scale(1.02);background:#1e293b}
.player{position:fixed;bottom:0;left:0;right:0;background:var(--card);padding:14px;display:flex;justify-content:space-between;align-items:center}
button{background:var(--accent);border:none;color:white;padding:10px 16px;border-radius:10px}
</style>
</head>
<body><header>🎧 Wave Music</header><div class="search">
<input id="search" placeholder="Search songs or artists..." />
</div><div class="list" id="list"></div><div id="player"></div><div class="player">
<button onclick="prev()">⏮</button>
<button onclick="toggle()">⏯</button>
<button onclick="next()">⏭</button>
</div><script src="https://www.youtube.com/iframe_api"></script><script>
let player, songs=[], index=0, playing=false;

const INSTANCES=[
'https://invidious.slipfox.xyz',
'https://inv.zzls.xyz',
'https://yewtu.be'
];

async function fetchSongs(q){
for(const base of INSTANCES){
try{
const res=await fetch(`${base}/api/v1/search?q=${encodeURIComponent(q)}&type=video`);
const data=await res.json();
songs=data.slice(0,15);
render();
return;
}catch(e){continue}
}
alert('All APIs failed 😢');
}

function render(){
const list=document.getElementById('list');
list.innerHTML=songs.map((s,i)=>`
<div class="song" onclick="play(${i})">
${s.title}
</div>
`).join('');
}

function onYouTubeIframeAPIReady(){
player=new YT.Player('player',{
height:'0',width:'0',videoId:'',
events:{onStateChange:e=>{
if(e.data===YT.PlayerState.UNSTARTED) next();
}}
});
}

function play(i){
index=i;
player.loadVideoById(songs[i].videoId);
setTimeout(()=>player.playVideo(),300);
playing=true;
}

function toggle(){
if(!player)return;
const state=player.getPlayerState();
if(state===1){player.pauseVideo();playing=false}
else{player.playVideo();playing=true}
}

function next(){
index=(index+1)%songs.length;
play(index);
}

function prev(){
index=(index-1+songs.length)%songs.length;
play(index);
}

// search listener
const input=document.getElementById('search');
input.addEventListener('input',()=>{
if(input.value.length>2){
fetchSongs(input.value);
}
});

// default
fetchSongs('pop music');
</script></body>
</html>
